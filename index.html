<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="計算ドリル">
<meta name="theme-color" content="#1a0533">
<title>⚡ ゴジュウジャー計算ドリル ⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2d55; --blue: #007aff; --yellow: #ffd60a;
    --green: #30d158; --purple: #bf5af2;
    --bg: #0a001a; --card: #1c0840; --card2: #240a52;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: var(--bg); color: #fff;
    position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 45%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 20% 70%, rgba(255,214,10,.6) 0%, transparent 100%),
      radial-gradient(2px 2px at 70% 10%, rgba(0,122,255,.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 90% 85%, rgba(255,45,85,.5) 0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }

  /* ---- 全画面共通 ---- */
  .screen {
    display: none; flex-direction: column; align-items: center;
    position: fixed; inset: 0; overflow-y: auto;
    padding: 20px 16px 32px;
    z-index: 1;
  }
  .screen.active { display: flex; }

  /* ========== タイトル画面 ========== */
  .title-logo {
    font-size: 1rem; font-weight: 900; letter-spacing: .15em;
    color: var(--yellow); text-shadow: 0 0 20px rgba(255,214,10,.8);
    margin-top: 16px;
  }
  .title-hero {
    font-size: 2.4rem; font-weight: 900; text-align: center; line-height: 1.1; margin-top: 6px;
    background: linear-gradient(135deg,#ff2d55,#ff9500,#ffd60a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 12px rgba(255,100,0,.6));
  }
  .title-sub { font-size: 1.3rem; font-weight: 900; color:#fff; margin-top:4px; text-shadow:0 0 10px rgba(0,122,255,.8); }

  .rangers-display { display:flex; gap:6px; margin:14px 0; justify-content:center; }
  .ranger-icon-wrap {
    width:54px; height:54px; border-radius:50%; overflow:hidden;
    border:2px solid rgba(255,255,255,.25);
    box-shadow:0 0 14px rgba(255,255,255,.2);
    animation: float 3s ease-in-out infinite;
  }
  .ranger-icon-wrap img { width:100%; height:100%; object-fit:cover; }
  .ranger-icon-wrap:nth-child(1){animation-delay:0s}
  .ranger-icon-wrap:nth-child(2){animation-delay:.3s}
  .ranger-icon-wrap:nth-child(3){animation-delay:.6s}
  .ranger-icon-wrap:nth-child(4){animation-delay:.9s}
  .ranger-icon-wrap:nth-child(5){animation-delay:1.2s}
  .ranger-icon-wrap:nth-child(6){animation-delay:1.5s}
  @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-7px) rotate(4deg)} }

  .section-card {
    background:var(--card); border:1px solid rgba(255,255,255,.1); border-radius:20px;
    padding:14px; width:100%; max-width:380px; margin-bottom:12px;
  }
  .section-title { font-size:.8rem; font-weight:700; color:var(--yellow); letter-spacing:.1em; margin-bottom:8px; }
  .op-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .op-btn {
    aspect-ratio:1; border:none; border-radius:14px; font-size:1.4rem; font-weight:900;
    cursor:pointer; transition:all .15s; position:relative; overflow:hidden;
    font-family:'M PLUS Rounded 1c',sans-serif; color:#fff;
  }
  .op-btn[data-op="+"]{background:linear-gradient(135deg,#ff4d6d,var(--red))}
  .op-btn[data-op="-"]{background:linear-gradient(135deg,#4d94ff,var(--blue))}
  .op-btn[data-op="×"]{background:linear-gradient(135deg,#ffa940,#ff6b00)}
  .op-btn[data-op="÷"]{background:linear-gradient(135deg,#4dff91,var(--green));color:#004d1a}
  .op-btn.selected{transform:scale(.95);box-shadow:0 0 0 3px var(--yellow),0 0 20px rgba(255,214,10,.5)}
  .grade-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
  .grade-btn {
    aspect-ratio:1; border:2px solid rgba(255,255,255,.2); border-radius:12px;
    background:var(--card2); color:#fff;
    font-family:'M PLUS Rounded 1c',sans-serif; font-size:.8rem; font-weight:900;
    cursor:pointer; transition:all .15s; display:flex; flex-direction:column;
    align-items:center; justify-content:center; line-height:1.1;
  }
  .grade-btn .gn{font-size:1.1rem}
  .grade-btn.selected{background:linear-gradient(135deg,var(--purple),var(--blue));border-color:var(--yellow);box-shadow:0 0 16px rgba(191,90,242,.5);transform:scale(.95)}
  .start-btn {
    width:100%; max-width:380px; padding:16px; border:none; border-radius:20px;
    background:linear-gradient(135deg,#ff2d55,#ff9500); color:#fff;
    font-family:'M PLUS Rounded 1c',sans-serif; font-size:1.2rem; font-weight:900;
    cursor:pointer; letter-spacing:.1em; box-shadow:0 8px 30px rgba(255,45,85,.5);
    transition:all .2s; position:relative; overflow:hidden;
  }
  .start-btn::after{
    content:''; position:absolute; top:-50%;left:-50%;width:200%;height:200%;
    background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,.2) 50%,transparent 70%);
    animation:shine 3s infinite;
  }
  @keyframes shine{0%{transform:translateX(-100%) translateY(-100%) rotate(45deg)}100%{transform:translateX(100%) translateY(100%) rotate(45deg)}}
  .start-btn:active{transform:scale(.97)}
  .start-btn:disabled{opacity:.4;cursor:not-allowed}

  /* ========== クイズ画面 ========== */
  /* 画面全体をflex列で固定：スクロールなしで全要素を収める */
  #screen-quiz {
    justify-content: space-between;
    padding: 12px 12px 12px;
    overflow: hidden;
  }
  .quiz-header {
    display:flex; width:100%; max-width:380px; align-items:center; gap:8px;
    flex-shrink: 0;
  }
  .progress-bar-wrap{flex:1;height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
  .progress-bar-fill{
    height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));
    border-radius:4px;transition:width .4s ease;box-shadow:0 0 8px rgba(0,122,255,.6)
  }
  .progress-text{font-size:.8rem;font-weight:700;color:rgba(255,255,255,.7);white-space:nowrap}
  .score-display{font-size:.8rem;font-weight:700;color:var(--yellow)}

  .question-card {
    background:var(--card); border:1px solid rgba(255,255,255,.1); border-radius:20px;
    padding:20px 16px 16px; width:100%; max-width:380px; text-align:center;
    box-shadow:0 16px 40px rgba(0,0,0,.5); animation:slideIn .3s ease;
    flex-shrink: 0;
  }
  @keyframes slideIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  .question-label{font-size:.75rem;color:rgba(255,255,255,.5);letter-spacing:.15em;margin-bottom:6px}
  .question-text{
    font-size:2.8rem;font-weight:900;letter-spacing:.04em;line-height:1.1;
    background:linear-gradient(135deg,#fff,rgba(255,255,255,.8));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .question-text .op-symbol{-webkit-text-fill-color:var(--yellow)}
  .answer-box{
    font-size:2.6rem;font-weight:900;color:var(--yellow);min-height:48px;
    display:flex;align-items:center;justify-content:center;
    border-bottom:3px solid rgba(255,214,10,.4);margin:10px auto 0;max-width:200px;letter-spacing:.04em;
  }
  .answer-cursor{
    display:inline-block;width:2px;height:2.6rem;background:var(--yellow);
    margin-left:2px;animation:blink 1s step-end infinite;vertical-align:middle;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* テンキー：残りスペースを埋める */
  .numpad {
    display:grid;grid-template-columns:repeat(3,1fr);gap:7px;
    width:100%;max-width:380px;
    flex: 1;
    align-content: stretch;
  }
  .num-btn {
    border:none;border-radius:14px;background:var(--card);
    border:1px solid rgba(255,255,255,.12);color:#fff;
    font-family:'M PLUS Rounded 1c',sans-serif;font-size:1.5rem;font-weight:900;
    cursor:pointer;transition:all .1s;
    min-height: 0;
  }
  .num-btn:active{transform:scale(.93);background:var(--card2)}
  .num-btn.zero{grid-column:span 2;font-size:1.5rem}
  .num-btn.del{background:linear-gradient(135deg,#3a1a00,#5a2a00);border-color:rgba(255,100,0,.3)}
  .num-btn.del:active{background:linear-gradient(135deg,#6a2a00,#8a4000)}
  .submit-btn {
    grid-column:span 3;
    border:none;border-radius:14px;
    background:linear-gradient(135deg,var(--green),#007a30);color:#fff;
    font-family:'M PLUS Rounded 1c',sans-serif;font-size:1.15rem;font-weight:900;
    cursor:pointer;letter-spacing:.05em;
    box-shadow:0 6px 20px rgba(48,209,88,.4);transition:all .15s;
    min-height: 0;
  }
  .submit-btn:active{transform:scale(.97)}

  /* ========== フィードバック画面 ========== */
  .feedback-screen{ justify-content:center; gap:0; overflow-y:auto; }
  .feedback-ranger{
    width:130px;height:130px;border-radius:50%;overflow:hidden;
    margin-bottom:10px;
    filter:drop-shadow(0 0 24px rgba(255,255,255,.35));
    animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);
    border:3px solid rgba(255,255,255,.3);
    flex-shrink:0;
  }
  .feedback-ranger img{width:100%;height:100%;object-fit:cover}
  @keyframes popIn{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
  .feedback-correct-label{
    font-size:1.1rem;font-weight:900;text-align:center;margin-bottom:2px;
    letter-spacing:.05em;
    animation:fadeUp .3s ease .1s both;
  }
  .feedback-name{
    font-size:1.15rem;font-weight:900;text-align:center;margin-bottom:10px;
    letter-spacing:.08em;
    text-shadow:0 0 10px currentColor;
    animation:fadeUp .3s ease .15s both;
  }
  .feedback-msg{
    font-size:1.25rem;font-weight:900;text-align:center;
    color:#fff;line-height:1.65;
    background:rgba(255,255,255,.06);
    border-left:4px solid rgba(255,255,255,.4);
    border-radius:0 14px 14px 0;
    padding:12px 20px 12px 16px;
    margin:0 8px;
    animation:fadeUp .35s ease .2s both;
  }
  @keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
  .feedback-answer-show{
    background:var(--card);border-radius:14px;padding:10px 20px;margin-top:10px;
    font-size:.95rem;text-align:center;
    animation:fadeUp .3s ease .3s both;border:1px solid rgba(255,255,255,.1);
  }
  .next-btn{
    margin-top:16px;padding:14px 44px;border:none;border-radius:50px;
    background:linear-gradient(135deg,var(--yellow),#ff9500);color:#1a0000;
    font-family:'M PLUS Rounded 1c',sans-serif;font-size:1.15rem;font-weight:900;
    cursor:pointer;box-shadow:0 8px 24px rgba(255,214,10,.4);transition:all .15s;
    animation:fadeUp .3s ease .35s both;letter-spacing:.05em;
  }
  .next-btn:active{transform:scale(.97)}

  /* ========== リザルト画面 ========== */
  #screen-result{ overflow-y:auto; }
  .result-ranger-big{
    width:130px;height:130px;border-radius:50%;overflow:hidden;
    margin:14px auto;border:3px solid rgba(255,255,255,.3);
    filter:drop-shadow(0 0 28px rgba(255,255,255,.3));
    animation:popIn .5s cubic-bezier(.175,.885,.32,1.275);
  }
  .result-ranger-big img{width:100%;height:100%;object-fit:cover}
  .result-correct-wrong{font-size:3.2rem;font-weight:900;text-align:center;animation:fadeUp .4s ease .15s both}
  .result-correct-wrong span{color:var(--green)}
  .result-message{font-size:1.7rem;font-weight:900;text-align:center;line-height:1.2;margin:4px 0 6px;animation:fadeUp .4s ease .2s both;white-space:pre-line}
  .result-quote{font-size:.95rem;text-align:center;color:rgba(255,255,255,.8);margin-bottom:16px;padding:0 20px;animation:fadeUp .4s ease .3s both;font-weight:700}
  .result-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:380px;margin-top:4px;animation:fadeUp .4s ease .4s both}
  .retry-btn{
    padding:14px;border:none;border-radius:14px;
    background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;
    font-family:'M PLUS Rounded 1c',sans-serif;font-size:1.05rem;font-weight:900;
    cursor:pointer;letter-spacing:.05em;box-shadow:0 6px 20px rgba(0,122,255,.4);transition:all .15s;
  }
  .retry-btn:active{transform:scale(.97)}
  .home-btn{
    padding:14px;border:2px solid rgba(255,255,255,.2);border-radius:14px;
    background:transparent;color:rgba(255,255,255,.7);
    font-family:'M PLUS Rounded 1c',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s;
  }
  .home-btn:active{background:rgba(255,255,255,.05)}

  /* confetti */
  .particle{position:fixed;border-radius:2px;animation:fall linear forwards;z-index:999;pointer-events:none}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<!-- ========== タイトル画面 ========== -->
<div class="screen active" id="screen-title">
  <div class="title-logo">⚡ Power Rangers</div>
  <div class="title-hero">ゴジュウジャー</div>
  <div class="title-sub">計算ドリル</div>
  <div class="rangers-display" id="title-rangers"></div>

  <div class="section-card">
    <div class="section-title">① けいさんのしゅるい</div>
    <div class="op-grid">
      <button class="op-btn" data-op="+" onclick="selectOp(this,'+')">＋</button>
      <button class="op-btn" data-op="-" onclick="selectOp(this,'-')">－</button>
      <button class="op-btn" data-op="×" onclick="selectOp(this,'×')">×</button>
      <button class="op-btn" data-op="÷" onclick="selectOp(this,'÷')">÷</button>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title">② なんねんせい？</div>
    <div class="grade-grid">
      <button class="grade-btn" onclick="selectGrade(this,1)"><span class="gn">1</span>年生</button>
      <button class="grade-btn" onclick="selectGrade(this,2)"><span class="gn">2</span>年生</button>
      <button class="grade-btn" onclick="selectGrade(this,3)"><span class="gn">3</span>年生</button>
      <button class="grade-btn" onclick="selectGrade(this,4)"><span class="gn">4</span>年生</button>
      <button class="grade-btn" onclick="selectGrade(this,5)"><span class="gn">5</span>年生</button>
      <button class="grade-btn" onclick="selectGrade(this,6)"><span class="gn">6</span>年生</button>
    </div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startDrill()" disabled>
    ⚡ ちょうせん スタート！
  </button>
</div>

<!-- ========== クイズ画面 ========== -->
<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">1 / 10</div>
    <div class="score-display" id="score-display">⭐ 0</div>
  </div>
  <div class="question-card" id="question-card">
    <div class="question-label">もんだい</div>
    <div class="question-text" id="question-text"></div>
    <div class="answer-box" id="answer-box"><span class="answer-cursor"></span></div>
  </div>
  <div class="numpad">
    <button class="num-btn" onclick="pressNum('7')">7</button>
    <button class="num-btn" onclick="pressNum('8')">8</button>
    <button class="num-btn" onclick="pressNum('9')">9</button>
    <button class="num-btn" onclick="pressNum('4')">4</button>
    <button class="num-btn" onclick="pressNum('5')">5</button>
    <button class="num-btn" onclick="pressNum('6')">6</button>
    <button class="num-btn" onclick="pressNum('1')">1</button>
    <button class="num-btn" onclick="pressNum('2')">2</button>
    <button class="num-btn" onclick="pressNum('3')">3</button>
    <button class="num-btn zero" onclick="pressNum('0')">0</button>
    <button class="num-btn del" onclick="pressDelete()">⌫</button>
    <button class="submit-btn" onclick="submitAnswer()">✓ こたえる</button>
  </div>
</div>

<!-- ========== フィードバック画面 ========== -->
<div class="screen feedback-screen" id="screen-feedback">
  <div class="feedback-ranger" id="feedback-ranger"><img id="feedback-ranger-img" src="" alt="ranger"></div>
  <div class="feedback-correct-label" id="feedback-label"></div>
  <div class="feedback-name" id="feedback-name"></div>
  <div class="feedback-msg" id="feedback-msg"></div>
  <div class="feedback-answer-show" id="feedback-answer-detail"></div>
  <button class="next-btn" onclick="nextQuestion()">つぎへ ▶</button>
</div>

<!-- ========== リザルト画面 ========== -->
<div class="screen" id="screen-result">
  <div class="title-logo" style="margin-top:16px">⚡ けっか</div>
  <div class="result-ranger-big" id="result-ranger"><img id="result-ranger-img" src="" alt="ranger"></div>
  <div class="result-correct-wrong" id="result-score-text"></div>
  <div class="result-message" id="result-message"></div>
  <div class="result-quote" id="result-quote"></div>
  <div class="result-actions">
    <button class="retry-btn" onclick="retryDrill()">🔄 もう一度チャレンジ！</button>
    <button class="home-btn" onclick="goHome()">🏠 えらびなおす</button>
  </div>

// ========== 状態 ==========
let selectedOp = null, selectedGrade = null;
let questions = [], currentQ = 0, score = 0, userAnswer = '';

// ========== 問題生成 ==========
function getRange(grade, op) {
  const r = {
    '+': [[1,10],[1,20],[1,100],[100,1000],[1,10000],[1,100000]],
    '-': [[1,10],[1,20],[1,100],[100,1000],[1,10000],[1,100000]],
    '×': [[1,5],[2,9],[2,9],[10,99],[100,999],[1000,9999]],
    '÷': [[1,5],[2,9],[2,9],[10,99],[100,999],[1000,9999]],
  };
  return r[op][grade-1];
}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function generateQuestion(op, grade){
  const [min,max]=getRange(grade,op);
  let a,b,answer;
  if(op==='+'){a=rand(min,max);b=rand(min,max);answer=a+b}
  else if(op==='-'){a=rand(min,max);b=rand(min,max);if(a<b)[a,b]=[b,a];answer=a-b}
  else if(op==='×'){a=rand(2,max>9?12:max);b=rand(2,9);answer=a*b}
  else{b=rand(2,grade<=2?9:12);answer=rand(2,grade<=2?9:max);a=b*answer}
  const op2={'+':'＋','-':'－','×':'×','÷':'÷'}[op];
  return{text:`${a.toLocaleString()} ${op2} ${b.toLocaleString()}`,answer,a,b};
}
function generateQuestions(){
  return Array.from({length:10},()=>generateQuestion(selectedOp,selectedGrade));
}

// ========== UI ==========
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function selectOp(btn,op){
  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); selectedOp=op; checkReady();
}
function selectGrade(btn,grade){
  document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); selectedGrade=grade; checkReady();
}
function checkReady(){document.getElementById('start-btn').disabled=!(selectedOp&&selectedGrade)}

// ========== テンキー ==========
function pressNum(n){if(userAnswer.length>=7)return;userAnswer+=n;updateAnswerBox()}
function pressDelete(){userAnswer=userAnswer.slice(0,-1);updateAnswerBox()}
function updateAnswerBox(){
  const b=document.getElementById('answer-box');
  b.innerHTML=userAnswer?(userAnswer+'<span class="answer-cursor"></span>'):'<span class="answer-cursor"></span>';
}

// ========== ドリル制御 ==========
function startDrill(){
  questions=generateQuestions();currentQ=0;score=0;
  showNextQuestion();showScreen('screen-quiz');
}
function showNextQuestion(){
  userAnswer='';updateAnswerBox();
  const q=questions[currentQ];
  document.getElementById('progress-fill').style.width=((currentQ/10)*100)+'%';
  document.getElementById('progress-text').textContent=`${currentQ+1} / 10`;
  document.getElementById('score-display').textContent=`⭐ ${score}`;
  document.getElementById('question-text').innerHTML=
    q.text.replace(/(＋|－|×|÷)/,'<span class="op-symbol">$1</span>')+' ＝ ？';
  const card=document.getElementById('question-card');
  card.style.animation='none';card.offsetHeight;card.style.animation='slideIn .3s ease';
}
function submitAnswer(){
  if(!userAnswer)return;
  const q=questions[currentQ];
  const user=parseInt(userAnswer,10);
  const correct=user===q.answer;
  if(correct)score++;
  showFeedback(correct,q,user);
}

function showFeedback(correct,q,userAns){
  const r=rangers[Math.floor(Math.random()*rangers.length)];
  const msgs=correct?r.correct:r.wrong;
  const msg=msgs[Math.floor(Math.random()*msgs.length)];

  document.getElementById('feedback-ranger-img').src=r.img;

  // 正解・不正解バッジ（小さめに）
  document.getElementById('feedback-label').textContent=correct?'⭕ せいかい！':'❌ ざんねん…';
  document.getElementById('feedback-label').style.color=correct?'#30d158':'#ff2d55';

  // キャラ名を強調
  document.getElementById('feedback-name').textContent=r.name;
  document.getElementById('feedback-name').style.color= r.color;

  // セリフ枠のアクセントカラーをキャラ色に
  const msgEl = document.getElementById('feedback-msg');
  msgEl.style.borderLeftColor = r.color;
  msgEl.textContent = msg;

  if(correct){
    document.getElementById('feedback-answer-detail').innerHTML=`<b>${q.text} ＝ ${q.answer}</b> ✨`;
    launchConfetti();
  } else {
    document.getElementById('feedback-answer-detail').innerHTML=
      `こたえ: <b style="color:#ffd60a">${q.text} ＝ ${q.answer}</b><br>あなたの答え: ${userAns}`;
  }
  showScreen('screen-feedback');
}

function nextQuestion(){
  currentQ++;
  if(currentQ>=10)showResult();
  else{showNextQuestion();showScreen('screen-quiz');}
}

function showResult(){
  const pct=score/10;
  let ri,title,quote;
  if(pct===1){ri=0;title='🏆 かんぺき！\n10問全問正解！';quote='「信じられない！君はゴジュウジャーの中で最強だぞ！」'}
  else if(pct>=0.8){ri=1;title='⭐ すばらしい！\nほぼ完璧だ！';quote='「あと一歩！次は必ずパーフェクトを掴め！」'}
  else if(pct>=0.6){ri=2;title='👍 いいぞ！\nよくがんばった！';quote='「その調子！ゴジュウジャーは毎日鍛錬するんだ！」'}
  else if(pct>=0.4){ri=3;title='💪 ファイト！\nもう一度挑戦！';quote='「諦めなければ必ず強くなれる！もう一回だ！」'}
  else{ri=4;title='🌱 これからだ！\n練習あるのみ！';quote='「ヒーローは失敗から立ち上がる！一緒に頑張ろう！」'}
  
  const r=rangers[ri];
  document.getElementById('result-ranger-img').src=r.img;
  document.getElementById('result-score-text').innerHTML=
    `<span style="color:var(--green)">${score}</span><span style="color:rgba(255,255,255,.4);font-size:2rem"> / 10</span>`;
  document.getElementById('result-message').textContent=title;
  document.getElementById('result-quote').textContent=quote;
  if(pct>=0.8)launchConfetti(80);
  showScreen('screen-result');
}

function retryDrill(){startDrill()}
function goHome(){showScreen('screen-title')}

// ========== 初期化 ==========
document.addEventListener('DOMContentLoaded',()=>{
  const container=document.getElementById('title-rangers');
  rangers.forEach((r,i)=>{
    const wrap=document.createElement('div');
    wrap.className='ranger-icon-wrap';
    wrap.style.animationDelay=(i*.25)+'s';
    const img=document.createElement('img');
    img.src=r.img; img.alt=r.name;
    wrap.appendChild(img);
    container.appendChild(wrap);
  });
  // クイズ画面の高さを正確にフィット
  fitQuizScreen();
  window.addEventListener('resize',fitQuizScreen);
});

function fitQuizScreen(){
  // iPhoneのSafariではdvhが使えるが、念のためJSでも調整
  const s=document.getElementById('screen-quiz');
  s.style.height=window.innerHeight+'px';
}

// ========== コンフェッティ ==========
function launchConfetti(count=40){
  const colors=['#ff2d55','#007aff','#ffd60a','#30d158','#bf5af2','#ff9500'];
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='particle';
      p.style.cssText=`left:${Math.random()*100}vw;top:-10px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        width:${Math.random()*8+4}px;height:${Math.random()*8+4}px;
        animation-duration:${Math.random()*1.5+0.8}s;
        animation-delay:${Math.random()*0.5}s`;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),3000);
    },i*20);
  }
}
